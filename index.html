<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smooth Criminal Spiral</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      #spiral-canvas { display: block; width: 100%; height: 100%; }
      .fade-overlay {
        position: fixed; left: 0; right: 0; height: 15vh;
        pointer-events: none; z-index: 10;
      }
      .fade-top {
        top: 0;
        background: linear-gradient(to bottom, #000 0%, transparent 100%);
      }
      .fade-bottom {
        bottom: 0;
        background: linear-gradient(to top, #000 0%, transparent 100%);
      }
    </style>
  </head>
  <body>
    <canvas id="spiral-canvas"></canvas>
    <div class="fade-overlay fade-top"></div>
    <div class="fade-overlay fade-bottom"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
